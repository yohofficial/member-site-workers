<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>マイページ</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
    }

    /* ===== ヘッダー（ロゴ固定） ===== */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    /* ===== メインコンテンツ ===== */
    main {
      padding: 80px 16px 80px; /* 上ヘッダー分・下フッター分余白 */
      min-height: 100vh;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    /* ===== フッタータブ固定 ===== */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: white;
      display: flex;
      border-top: 1px solid #ddd;
      z-index: 1000;
    }

    .tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      cursor: pointer;
    }

    .tab.active {
      font-weight: bold;
      border-top: 3px solid #06C755; /* LINE風グリーン */
    }
  </style>
</head>
<body>

  <header>
    <img src="https://lh3.googleusercontent.com/d/1JcMBGVlb2Hl6Wdo29DyNOVBk7sAHwlgp" style="width:160px;">
  </header>

  <main>
    <div class="card">
      <h2>ユーザー情報</h2>
      <p id="name">読み込み中...</p>
    </div>

    <div class="card">
      <h2>ポイント</h2>
      <p id="points">-- pt</p>
    </div>

    <div style="height: 800px;"></div>
  </main>

  <footer>
    <div class="tab active" onclick="selectTab(this)">マイページ</div>
    <div class="tab" onclick="selectTab(this)">予約</div>
    <div class="tab" onclick="selectTab(this)">限定メニュー</div>
  </footer>

  <script>
    function selectTab(el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    }

    // APIからユーザー情報取得
    fetch('/api/me')
      .then(res => res.json())
      .then(data => {
        if (data.display_name) {
          document.getElementById('name').textContent = data.display_name;
          document.getElementById('points').textContent = (data.points || 0) + ' pt';
        }
      });
  </script>

</body>
</html>
